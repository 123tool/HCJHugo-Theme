    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Filter pill styling */
        .filter-pill {
            @apply border border-neutral-800 px-5 py-1.5 rounded-full text-sm font-medium transition-all duration-300;
            color: #d1d1d1;
        }

        .filter-pill:hover {
            @apply border-neutral-400 text-white;
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* Card transition */
        .gallery-card {
            @apply transition-transform duration-500 ease-out cursor-pointer;
        }

        .gallery-card:hover .card-image {
            @apply scale-105;
        }

        .gallery-card:hover .card-overlay {
            @apply opacity-20;
        }

        /* Image corners */
        .card-image-container {
            @apply overflow-hidden rounded-[2rem] relative; /* Radius besar sesuai demo */
        }

        .card-image {
            @apply transition-transform duration-700;
        }

        .card-overlay {
            @apply absolute inset-0 bg-black opacity-0 transition-opacity duration-300;
        }

        /* Footer links */
        .footer-link {
            @apply text-neutral-500 hover:text-white transition-colors text-xs font-medium;
        }

        /* Hamburger menu bar */
        .menu-bar {
            @apply w-5 h-0.5 bg-white mb-1.5 last:mb-0;
        }
    </style>
</head>
