            border-left: 15px solid var(--accent-color);
            transition: transform 0.3s ease;

        .showcase-card:hover {
            transform: scale(1.02);

    <script>
        function setTheme(color, btn) {
            // Update CSS Variable
            document.documentElement.style.setProperty('--accent-color', color);
            
            // Update UI feedback
            const updateText = document.getElementById('update-text');
            updateText.style.color = color;

            // Update active button state
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // Optional: Log to console in terminal style
            console.log(`%c [SYSTEM] Theme updated to: ${color}`, `color: ${color}; font-weight: bold;`);
        }

        // Initialize animation or simple effects
        window.onload = () => {
            console.log("%c re-Terminal Initialized ", "background: #ff5f56; color: #000; font-weight: bold;");
        };
    </script>
