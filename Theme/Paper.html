        :root {

            --accent-orange: #d97706; /* Untuk label Featured */

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
        }

        .container-custom {
            max-width: 720px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* Navigasi Atas */
        .brand-text {
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .nav-link {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-primary);
            transition: opacity 0.2s;
        }

        .nav-link:hover {
            opacity: 0.6;
        }

        /* Bagian Profil/Header */
        .avatar-circle {
            width: 64px;
            height: 64px;
            background-color: #000000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        /* List Postingan */
        .featured-tag {
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--accent-orange);
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
            display: block;
        }

        .post-title {
            font-size: 1.25rem;
            font-weight: 700;
            text-decoration: none;
            color: var(--text-primary);
            display: block;
            margin-bottom: 0.25rem;
            transition: transform 0.2s ease;
        }

        .post-title:hover {
            transform: translateX(4px);
        }

        .post-date {
            font-size: 0.75rem;
            color: #999;

        }

        /* Tombol Halaman Berikutnya */
        .btn-next {

            align-items: center;
            gap: 0.5rem;
            transition: opacity 0.2s;
        }

        .btn-next:hover {
            opacity: 0.8;
        }

        /* Footer */
        .footer-text {
            font-size: 0.7rem;
            color: #999;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Ikon Sosial */
        .social-icon {
            color: var(--text-primary);
            transition: opacity 0.2s;
        }
        .social-icon:hover { opacity: 0.5; }

        @media (max-width: 640px) {
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
            .nav-right {
                width: 100%;
                justify-content: space-between;
            }
        }
    </style>
</head>
